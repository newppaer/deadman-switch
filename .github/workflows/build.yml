name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee /tmp/build.log
    
    - name: Debug output
      if: always()
      run: |
        echo "=== Gradle build output dir ==="
        find app/build -type d 2>/dev/null | head -30
        echo "=== All APKs ==="
        find . -name "*.apk" 2>/dev/null
        echo "=== Build log tail ==="
        tail -50 /tmp/build.log 2>/dev/null
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/**/*.apk
        if-no-files-found: error
