name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace
    
    - name: Find and copy APK
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f | tee /tmp/apk_list.txt
        echo "=== Build outputs tree ==="
        find app/build/outputs -type f 2>/dev/null || echo "No outputs"
        mkdir -p /tmp/apk_out
        find app/build/outputs -name "*.apk" -exec cp {} /tmp/apk_out/ \; 2>/dev/null
        ls -la /tmp/apk_out/ 2>/dev/null || echo "No APK found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: /tmp/apk_out/*.apk
        if-no-files-found: warn
