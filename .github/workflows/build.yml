name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Build APK
      run: |
        chmod +x gradlew
        echo "=== Gradle version ==="
        ./gradlew --version
        echo "=== Building ==="
        ./gradlew assembleDebug --no-daemon --stacktrace
        
    - name: Find APK
      if: always()
      run: |
        echo "=== tree of build dir ==="
        find app/build -type f 2>/dev/null | head -100
        echo "=== any apk anywhere ==="
        find / -name "*.apk" -type f 2>/dev/null | head -20
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/**/*.apk
        if-no-files-found: error
